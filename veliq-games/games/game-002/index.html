      html+='<div class="choices-area">';
      for(var i=0;i<choices.length;i++){
        html+='<button class="choice-btn" data-answer="'+choices[i].replace(/"/g,'&quot;')+'" onclick="answer(this)">';
        html+='<span class="choice-label">'+labels[i]+'</span>';
        html+='<span>'+choices[i]+'</span>';
        html+='</button>';
      }
      html+='</div></div>';
      return html;
    }

    function gameStart(){
      score=0;currentQ=0;answered=false;streak=0;
      beginnerCorrect=0;intermediateCorrect=0;advancedCorrect=0;
      clearInterval(timerInterval);clearTimeout(tickTimeout);
      document.getElementById('score-display').childNodes[0].textContent='0';
      document.getElementById('streak-bar').classList.remove('visible');
      updateProgress();
      document.getElementById('quiz-slide-container').innerHTML='';
      showScreen('play');
      if(typeof gtag==='function')gtag('event','game_start',{game_name:GAME_NAME});
      showQuestion();
    }

    function showQuestion(){
      if(currentQ>=questions.length){gameComplete();return;}
      answered=false;
      updateProgress();
      var container=document.getElementById('quiz-slide-container');

      var prev=container.querySelector('.quiz-card.current');
      container.innerHTML+=buildQuizCard(currentQ);
      var card=document.getElementById('card-'+currentQ);

      if(prev){
        prev.classList.remove('current');
        prev.classList.add('slide-out');
        card.offsetHeight;
        card.classList.add('slide-in');
        card.classList.add('current');
        setTimeout(function(){if(prev&&prev.parentNode)prev.parentNode.removeChild(prev)},400);
      }else{
        card.classList.add('current');
      }

      startTimer(currentQ);
    }

    function startTimer(qIdx){
      timerSeconds=15;
      var circumference=2*Math.PI*24;
      var fg=document.getElementById('timer-fg-'+qIdx);
      var txt=document.getElementById('timer-text-'+qIdx);
      if(!fg||!txt)return;

      clearInterval(timerInterval);clearTimeout(tickTimeout);
      fg.style.strokeDashoffset='0';
      fg.classList.remove('warn');
      txt.classList.remove('warn');

      timerInterval=setInterval(function(){
        timerSeconds--;
        if(!document.getElementById('timer-text-'+qIdx))return clearInterval(timerInterval);
        var el=document.getElementById('timer-text-'+qIdx);
        var fgEl=document.getElementById('timer-fg-'+qIdx);
        if(!el||!fgEl){clearInterval(timerInterval);return;}

        el.textContent=timerSeconds;
        var offset=circumference*(1-timerSeconds/15);
        fgEl.style.strokeDashoffset=offset;

        if(timerSeconds<=5){
          fgEl.classList.add('warn');
          el.classList.add('warn');
          playTick();
        }

        if(timerSeconds<=0){
          clearInterval(timerInterval);
          if(!answered)timeUp(qIdx);
        }
      },1000);
    }

    function timeUp(qIdx){
      answered=true;streak=0;updateStreak();
      var q=questions[currentQ];
      var card=document.getElementById('card-'+qIdx);
      if(!card)return;
      var btns=card.querySelectorAll('.choice-btn');
      btns.forEach(function(b){
        b.classList.add('disabled');
        if(b.getAttribute('data-answer')===q.a)b.classList.add('reveal');
      });
      playWrong();vibrate(100);
      currentQ++;
      setTimeout(showQuestion,1500);
    }

    function answer(btn){
      if(answered)return;
      answered=true;
      clearInterval(timerInterval);

      var choice=btn.getAttribute('data-answer');
      var q=questions[currentQ];
      var card=btn.closest('.quiz-card');
      var btns=card.querySelectorAll('.choice-btn');
      btns.forEach(function(b){b.classList.add('disabled')});

      var timeLeft=timerSeconds;
      var pts=0;

      if(choice===q.a){
        btn.classList.add('correct');
        btn.querySelector('.choice-label').textContent='\u2713';
        streak++;
        pts=10;
        if(timeLeft>=10)pts+=5;
        pts=Math.floor(pts*getStreakMultiplier());
        score+=pts;

        if(q.d==='初級')beginnerCorrect++;
        else if(q.d==='中級')intermediateCorrect++;
        else advancedCorrect++;

        updateScoreDisplay(pts);
        updateStreak();
        playCorrect();vibrate(50);

        var floater=document.createElement('div');
        floater.className='point-float';
        floater.textContent='+'+pts;
        card.appendChild(floater);
        setTimeout(function(){if(floater.parentNode)floater.parentNode.removeChild(floater)},1000);
      }else{
        btn.classList.add('wrong');
        btn.querySelector('.choice-label').textContent='\u2717';
        streak=0;updateStreak();
        btns.forEach(function(b){
          if(b.getAttribute('data-answer')===q.a){b.classList.add('reveal');b.querySelector('.choice-label').textContent='\u2713';}
        });
        playWrong();vibrate(100);
      }

      currentQ++;
      setTimeout(showQuestion,1500);
    }

    function gameComplete(){
      clearInterval(timerInterval);
      updateProgress();
      document.getElementById('progress-bar').style.width='100%';

      if(score>=180)rank='S';
      else if(score>=140)rank='A';
      else if(score>=100)rank='B';
      else if(score>=60)rank='C';
      else rank='D';

      var rankEl=document.getElementById('result-rank');
      rankEl.textContent=rank;
      rankEl.className='result-rank rank-'+rank.toLowerCase();

      document.getElementById('result-score').textContent=score+'点';

      var msgs={S:'素晴らしい！クラシック博士！',A:'なかなかの博識！',B:'まずまずの腕前！',C:'もう少し勉強しよう！',D:'クラシックの世界へようこそ！'};
      document.getElementById('result-msg').textContent=msgs[rank];

      var bd=document.getElementById('result-breakdown');
      var bPct=Math.round(beginnerCorrect/beginnerTotal*100);
      var iPct=Math.round(intermediateCorrect/intermediateTotal*100);
      var aPct=Math.round(advancedCorrect/advancedTotal*100);
      bd.innerHTML='<h3>正答率</h3>'+
        '<div class="breakdown-row"><span class="breakdown-label">初級（7問）</span><span class="breakdown-value '+(bPct>=70?'good':bPct>=40?'mid':'bad')+'">'+beginnerCorrect+'/'+beginnerTotal+' ('+bPct+'%)</span></div>'+
        '<div class="breakdown-row"><span class="breakdown-label">中級（7問）</span><span class="breakdown-value '+(iPct>=70?'good':iPct>=40?'mid':'bad')+'">'+intermediateCorrect+'/'+intermediateTotal+' ('+iPct+'%)</span></div>'+
        '<div class="breakdown-row"><span class="breakdown-label">上級（6問）</span><span class="breakdown-value '+(aPct>=70?'good':aPct>=40?'mid':'bad')+'">'+advancedCorrect+'/'+advancedTotal+' ('+aPct+'%)</span></div>';

      if(typeof gtag==='function')gtag('event','game_clear',{game_name:GAME_NAME,score:score,rank:rank});

      showScreen('result');
      if(rank==='S'||rank==='A')playFanfare();
      showAd('ad-result');
      showInterstitial();

      // Animate score counting
      var scoreEl=document.getElementById('result-score');
      var counter=0;var target=score;
      var step=Math.max(1,Math.floor(target/30));
      var countInterval=setInterval(function(){
        counter+=step;
        if(counter>=target){counter=target;clearInterval(countInterval);}
        scoreEl.textContent=counter+'点';
      },30);
    }

    function getShareText(){
      return '\u30AF\u30E9\u30B7\u30C3\u30AF\u691C\u5B9A\u3067'+rank+'\u30E9\u30F3\u30AF\uFF08'+score+'\u70B9\uFF09\u53D6\u5F97\uFF01 #VeliqGames #VariOrchestra';
    }

    function shareX(){
      if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'twitter'});
      window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(getShareText())+'&url='+encodeURIComponent(location.href),'_blank','width=550,height=420');
    }
    function shareLINE(){
      if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'line'});
      window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(location.href)+'&text='+encodeURIComponent(getShareText()),'_blank');
    }
    function copyLink(){
      if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'copy'});
      if(navigator.clipboard){navigator.clipboard.writeText(location.href).then(function(){alert('URL\u3092\u30B3\u30D4\u30FC\u3057\u307E\u3057\u305F\uFF01')})}
      else{var t=document.createElement('textarea');t.value=location.href;t.style.cssText='position:fixed;opacity:0;';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);alert('URL\u3092\u30B3\u30D4\u30FC\u3057\u307E\u3057\u305F\uFF01')}
    }

    function showAd(containerId){
      var c=document.getElementById(containerId);if(!c)return;
      c.innerHTML='<ins class="adsbygoogle" style="display:block" data-ad-client="'+AD_CLIENT+'" data-ad-slot="XXXXXXXXXX" data-ad-format="auto" data-full-width-responsive="true"></ins>';
      try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch(e){}
    }

    function showInterstitial(){
      playCount++;if(playCount%5!==0)return;
      var o=document.createElement('div');o.id='veliq-interstitial';
      o.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:10000;display:flex;align-items:center;justify-content:center;';
      o.innerHTML='<div style="background:#111;border:1px solid #C9A84C;border-radius:12px;padding:24px;max-width:340px;width:90%;text-align:center;"><p style="color:#C9A84C;margin-bottom:16px;">広告</p><ins class="adsbygoogle" style="display:block" data-ad-client="'+AD_CLIENT+'" data-ad-slot="XXXXXXXXXX" data-ad-format="auto"></ins><button onclick="document.getElementById(\'veliq-interstitial\').remove()" style="margin-top:16px;padding:10px 32px;background:linear-gradient(135deg,#C9A84C,#FFD700);color:#000;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;font-family:Noto Sans JP,sans-serif;">閉じる</button></div>';
      document.body.appendChild(o);
      try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch(e){}
    }

    if('serviceWorker' in navigator){navigator.serviceWorker.register('../../sw.js').catch(function(){})}
  </script>
</body>
