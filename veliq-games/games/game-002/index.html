    "@context": "https://schema.org",

    "applicationCategory": "Game",
    "operatingSystem": "Web Browser",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "JPY" },

  }

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}
    gtag('js',new Date());gtag('config','G-XXXXXXXXXX');

  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;font-family:'Noto Sans JP',sans-serif;background:#000;color:#fff;overflow-x:hidden;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    #app{width:100%;min-height:100%;max-width:480px;margin:0 auto;position:relative;display:flex;flex-direction:column}
    #header{padding:12px 16px;text-align:center;border-bottom:1px solid #222;position:sticky;top:0;background:#000;z-index:5}
    #game-title{font-size:18px;font-weight:900;color:#C9A84C}
    #score-display{font-size:14px;color:#aaa;margin-top:4px}
    #game-area{flex:1;position:relative;overflow-y:auto}
    .screen{position:absolute;top:0;left:0;width:100%;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;transition:opacity 0.3s;z-index:10}
    .screen.hidden{opacity:0;pointer-events:none;z-index:0}
    .screen h2{font-size:24px;font-weight:900;color:#C9A84C;margin-bottom:16px}
    .screen p{color:#ccc;margin-bottom:12px;line-height:1.6}
    .btn{display:inline-block;padding:14px 40px;background:#C9A84C;color:#000;font-size:18px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin:8px;font-family:'Noto Sans JP',sans-serif;transition:transform 0.1s}
    .btn:active{transform:scale(0.95)}
    .share-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
    .share-btn{padding:10px 16px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans JP',sans-serif}
    .share-x{background:#000;color:#fff;border:1px solid #555}
    .share-line{background:#06C755;color:#fff}
    .share-copy{background:#333;color:#fff}
    .ad-container{width:100%;min-height:50px;margin:12px 0;text-align:center}
    .gold{color:#C9A84C}.big{font-size:48px;font-weight:900}

    /* Quiz styles */
    #quiz-container{width:100%;padding:20px}
    #question-num{color:#C9A84C;font-size:14px;margin-bottom:8px}
    #difficulty-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px}
    .diff-easy{background:#2d5a2d;color:#6dff6d}
    .diff-medium{background:#5a4a2d;color:#ffcc44}
    .diff-hard{background:#5a2d2d;color:#ff6d6d}
    #question-text{font-size:22px;font-weight:900;color:#fff;margin-bottom:24px;line-height:1.4}
    .choice-btn{display:block;width:100%;padding:16px;margin:8px 0;background:#111;border:2px solid #333;border-radius:10px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;text-align:left;font-family:'Noto Sans JP',sans-serif;transition:border-color 0.2s,background 0.2s}
    .choice-btn:active{transform:scale(0.98)}
    .choice-btn.correct{border-color:#C9A84C;background:#2a2510;color:#C9A84C}
    .choice-btn.wrong{border-color:#ff4444;background:#2a1010;color:#ff4444}
    .choice-btn.reveal{border-color:#C9A84C;background:#2a2510;color:#C9A84C}
    #feedback{font-size:18px;font-weight:900;margin-top:16px;min-height:30px}

    /* Result */
    #rank-display{font-size:80px;margin:12px 0}
    .promo-card{background:#111;border:1px solid #C9A84C;border-radius:12px;padding:20px;margin:16px 0;text-align:center}
    .promo-card h3{color:#C9A84C;font-size:16px;margin-bottom:8px}
    .promo-card p{font-size:14px;color:#aaa;margin-bottom:12px}
    .promo-link{color:#C9A84C;text-decoration:underline;font-weight:700;font-size:16px}
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="game-title">🎼 クラシック検定</div>
      <div id="score-display">SCORE: 0 / Q1</div>
    </div>

    <div id="game-area">
      <!-- Start Screen -->
      <div id="screen-start" class="screen">
        <h2>🎼 この曲、誰の曲？</h2>
        <p>有名クラシック曲の作曲家を4択で答えよう！<br>全20問、初級〜上級の3段階！</p>
        <button class="btn" onclick="gameStart()">スタート</button>
      </div>

      <!-- Play Screen -->
      <div id="screen-play" class="screen hidden">
        <div id="quiz-container">
          <div id="question-num"></div>
          <div id="difficulty-badge"></div>
          <div id="question-text"></div>
          <div id="choices"></div>
          <div id="feedback"></div>
        </div>
      </div>

      <!-- Clear Screen -->
      <div id="screen-clear" class="screen hidden">
        <h2>結果発表</h2>
        <div id="rank-display" class="gold"></div>
        <p id="clear-message"></p>
        <p>スコア</p>
        <p id="clear-score" class="gold big"></p>
        <div class="ad-container" id="ad-clear"></div>

        <div class="promo-card">
          <h3>🎻 本物のクラシックを聴きたくなった？</h3>
          <p>本物の指揮者によるクラシックコンサートはこちら</p>
          <a class="promo-link" href="https://variorchestra.com" target="_blank" rel="noopener">→ VariOrchestra</a>
        </div>

        <div class="share-bar">
          <button class="share-btn share-x" onclick="shareX()">Xでシェア</button>
          <button class="share-btn share-line" onclick="shareLINE()">LINEでシェア</button>
          <button class="share-btn share-copy" onclick="copyLink()">URLコピー</button>
        </div>
        <button class="btn" style="margin-top:16px" onclick="gameStart()">もう一回</button>
      </div>
    </div>
  </div>

  <script>
    var GAME_NAME = 'classic-quiz';
    var SHARE_TEXT = 'クラシック検定で{rank}ランク取得！ #VeliqGames #VariOrchestra';
    var AD_CLIENT = 'ca-pub-XXXXXXXXXXXXXXXX';
    var playCount = 0;

    var questions = [
      // 初級 (1-8)
      {q:'交響曲第5番「運命」',a:'ベートーヴェン',c:['モーツァルト','バッハ','ハイドン'],d:'初級'},
      {q:'四季より「春」',a:'ヴィヴァルディ',c:['バッハ','ヘンデル','テレマン'],d:'初級'},
      {q:'トルコ行進曲',a:'モーツァルト',c:['ベートーヴェン','シューベルト','ハイドン'],d:'初級'},
      {q:'白鳥の湖',a:'チャイコフスキー',c:['プロコフィエフ','ストラヴィンスキー','ラフマニノフ'],d:'初級'},
      {q:'ボレロ',a:'ラヴェル',c:['ドビュッシー','サティ','フォーレ'],d:'初級'},
      {q:'エリーゼのために',a:'ベートーヴェン',c:['ショパン','リスト','シューマン'],d:'初級'},
      {q:'カノン',a:'パッヘルベル',c:['バッハ','ヘンデル','テレマン'],d:'初級'},
      {q:'アイネ・クライネ・ナハトムジーク',a:'モーツァルト',c:['ハイドン','ベートーヴェン','シューベルト'],d:'初級'},
      // 中級 (9-14)
      {q:'交響曲第9番「新世界より」',a:'ドヴォルザーク',c:['ブラームス','チャイコフスキー','マーラー'],d:'中級'},
      {q:'ラプソディ・イン・ブルー',a:'ガーシュウィン',c:['バーンスタイン','コープランド','エリントン'],d:'中級'},
      {q:'惑星より「木星」',a:'ホルスト',c:['エルガー','ブリテン','ヴォーン・ウィリアムズ'],d:'中級'},
      {q:'展覧会の絵',a:'ムソルグスキー',c:['リムスキー＝コルサコフ','ボロディン','グリンカ'],d:'中級'},
      {q:'交響詩「魔法使いの弟子」',a:'デュカス',c:['サン＝サーンス','フランク','マスネ'],d:'中級'},
      {q:'ピアノ協奏曲第2番',a:'ラフマニノフ',c:['チャイコフスキー','スクリャービン','プロコフィエフ'],d:'中級'},
      // 上級 (15-20)
      {q:'交響曲第8番「千人の交響曲」',a:'マーラー',c:['ブルックナー','リヒャルト・シュトラウス','ショスタコーヴィチ'],d:'上級'},
      {q:'牧神の午後への前奏曲',a:'ドビュッシー',c:['ラヴェル','フォーレ','サティ'],d:'上級'},
      {q:'春の祭典',a:'ストラヴィンスキー',c:['バルトーク','プロコフィエフ','ショスタコーヴィチ'],d:'上級'},
      {q:'ヴォツェック',a:'ベルク',c:['シェーンベルク','ウェーベルン','ヒンデミット'],d:'上級'},
      {q:'トゥーランガリラ交響曲',a:'メシアン',c:['ブーレーズ','デュティユー','プーランク'],d:'上級'},
      {q:'交響曲第4番',a:'ブラームス',c:['ブルックナー','マーラー','シューマン'],d:'上級'}
    ];

    var score = 0;
    var currentQ = 0;
    var answered = false;
    var rank = '';

    function shuffle(arr) {
      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
      }
      return arr;
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function(s){s.classList.add('hidden')});
      document.getElementById('screen-'+id).classList.remove('hidden');
    }

    function gameStart() {
      score = 0; currentQ = 0; answered = false;
      document.getElementById('score-display').textContent = 'SCORE: 0 / Q1';
      showScreen('play');
      if(typeof gtag==='function') gtag('event','game_start',{game_name:GAME_NAME});
      showQuestion();
    }

    function showQuestion() {
      if (currentQ >= questions.length) { gameComplete(); return; }
      answered = false;
      var q = questions[currentQ];
      document.getElementById('question-num').textContent = 'Q' + (currentQ+1) + ' / ' + questions.length;
      var badge = document.getElementById('difficulty-badge');
      badge.textContent = q.d;
      badge.className = q.d === '初級' ? 'diff-easy' : q.d === '中級' ? 'diff-medium' : 'diff-hard';
      document.getElementById('question-text').textContent = '♪「' + q.q + '」';
      document.getElementById('feedback').textContent = '';
      document.getElementById('score-display').textContent = 'SCORE: ' + score + ' / Q' + (currentQ+1);

      var choices = shuffle([q.a].concat(q.c));
      var html = '';
      for (var i = 0; i < choices.length; i++) {
        html += '<button class="choice-btn" onclick="answer(this,\'' + choices[i].replace(/'/g, "\\'") + '\')">' + choices[i] + '</button>';
      }
      document.getElementById('choices').innerHTML = html;
    }

    function answer(btn, choice) {
      if (answered) return;
      answered = true;
      var q = questions[currentQ];
      var btns = document.querySelectorAll('.choice-btn');

      if (choice === q.a) {
        btn.classList.add('correct');
        score += 10;
        document.getElementById('feedback').innerHTML = '<span style="color:#C9A84C">⭕ 正解！</span>';
      } else {
        btn.classList.add('wrong');
        document.getElementById('feedback').innerHTML = '<span style="color:#ff4444">❌ 不正解… 正解は ' + q.a + '</span>';
        // Reveal correct
        btns.forEach(function(b) {
          if (b.textContent === q.a) b.classList.add('reveal');
        });
      }

      // Disable all buttons
      btns.forEach(function(b) { b.style.pointerEvents = 'none'; });

      currentQ++;
      setTimeout(showQuestion, 1500);
    }

    function gameComplete() {
      var pct = score / (questions.length * 10) * 100;
      if (pct >= 90) rank = 'S';
      else if (pct >= 70) rank = 'A';
      else if (pct >= 50) rank = 'B';
      else if (pct >= 30) rank = 'C';
      else rank = 'D';

      document.getElementById('rank-display').textContent = rank;
      document.getElementById('clear-score').textContent = score + '/' + (questions.length * 10);
      var msgs = {S:'すごい！クラシック博士！',A:'なかなかの知識！',B:'まずまず！',C:'もう少し勉強しよう',D:'クラシック初心者だね'};
      document.getElementById('clear-message').textContent = msgs[rank];

      if(typeof gtag==='function') gtag('event','game_clear',{game_name:GAME_NAME,score:score,rank:rank});

      showScreen('clear');
      showAd('ad-clear');
      showInterstitial();
    }

    function buildShareData() { return { rank: rank }; }

    // === COMMON FUNCTIONS ===
    function showAd(containerId){var c=document.getElementById(containerId);if(!c)return;c.innerHTML='<ins class="adsbygoogle" style="display:block" data-ad-client="'+AD_CLIENT+'" data-ad-slot="XXXXXXXXXX" data-ad-format="auto" data-full-width-responsive="true"></ins>';try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch(e){}}
    function showInterstitial(){playCount++;if(playCount%5!==0)return;var o=document.createElement('div');o.id='veliq-interstitial';o.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:10000;display:flex;align-items:center;justify-content:center;';o.innerHTML='<div style="background:#111;border:1px solid #C9A84C;border-radius:12px;padding:24px;max-width:340px;width:90%;text-align:center;"><p style="color:#C9A84C;margin-bottom:16px;">広告</p><ins class="adsbygoogle" style="display:block" data-ad-client="'+AD_CLIENT+'" data-ad-slot="XXXXXXXXXX" data-ad-format="auto"></ins><button onclick="document.getElementById(\'veliq-interstitial\').remove()" style="margin-top:16px;padding:10px 32px;background:#C9A84C;color:#000;border:none;border-radius:6px;font-size:16px;cursor:pointer;">閉じる</button></div>';document.body.appendChild(o);try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch(e){}}
    function getShareText(data){var t=SHARE_TEXT;for(var k in data){t=t.replace(new RegExp('\\{'+k+'\\}','g'),data[k])}return t}
    function shareX(){if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'twitter'});window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(getShareText(buildShareData()))+'&url='+encodeURIComponent(location.href),'_blank','width=550,height=420')}
    function shareLINE(){if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'line'});window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(location.href)+'&text='+encodeURIComponent(getShareText(buildShareData())),'_blank')}
    function copyLink(){if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'copy'});if(navigator.clipboard){navigator.clipboard.writeText(location.href).then(function(){alert('URLをコピーしました！')})}else{var t=document.createElement('textarea');t.value=location.href;t.style.cssText='position:fixed;opacity:0;';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);alert('URLをコピーしました！')}}
    if('serviceWorker' in navigator){navigator.serviceWorker.register('../../sw.js').catch(function(){})}
  </script>
</body>
</html>
