<body>
  <div id="app">
    <div id="header">

  <script>
    var GAME_NAME='fx-trade',SHARE_TEXT='FXゲームで¥{asset}達成！（{rank}） #VeliqGames',AD_CLIENT='ca-pub-XXXXXXXXXXXXXXXX',playCount=0;
    var asset=10000,turn=0,maxTurns=30,leverage=1,rates=[],chart=null,sparkChart=null,currentRate=100,trading=false;
    var assetHistory=[],tradeResults=[],bestTrade=-Infinity,worstTrade=Infinity,wins=0,losses=0;
    var trend=0,momentum=0;

    // News system
    var newsPool=[
      {text:'日銀が利上げを示唆、市場に緊張走る',dir:-1,icon:'🏦',cls:'news-bearish'},
      {text:'米雇用統計が予想を大幅に上回る',dir:1,icon:'📊',cls:'news-bullish'},
      {text:'大手ファンドがVLQを大量購入との情報',dir:1,icon:'🐋',cls:'news-bullish'},
      {text:'規制強化の懸念が市場に広がる',dir:-1,icon:'⚠️',cls:'news-bearish'},
      {text:'テクニカル指標がゴールデンクロスを形成',dir:1,icon:'📈',cls:'news-bullish'},
      {text:'著名アナリスト「VLQは割高」と警告',dir:-1,icon:'💬',cls:'news-bearish'},
      {text:'新興国の需要増で取引量急増',dir:1,icon:'🌏',cls:'news-bullish'},
      {text:'大口の利確売りが観測される',dir:-1,icon:'📉',cls:'news-bearish'},
      {text:'市場は方向感なく推移',dir:0,icon:'😐',cls:'news-neutral'},
      {text:'週末を前にポジション調整の動き',dir:0,icon:'📅',cls:'news-neutral'},
      {text:'速報：主要取引所でシステム障害発生',dir:-1,icon:'🚨',cls:'news-bearish'},
      {text:'機関投資家の買い注文が増加傾向',dir:1,icon:'💰',cls:'news-bullish'},
      {text:'政府が暗号資産推進政策を発表',dir:1,icon:'🏛️',cls:'news-bullish'},
      {text:'ハッキング被害のニュースで市場動揺',dir:-1,icon:'🔓',cls:'news-bearish'},
    ];

    function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.add('hidden')});var e=document.getElementById('screen-'+id);if(e)e.classList.remove('hidden')}
    function fmtYen(n){return'¥'+Math.floor(Math.max(0,n)).toLocaleString()}

    function generateRate(prev){
      // Trend + momentum + noise + mean reversion
      momentum=momentum*0.7+(Math.random()-0.5)*0.02;
      trend=trend*0.9+(Math.random()-0.5)*0.01;
      var revert=(100-prev)*0.003;
      var noise=(Math.random()-0.5)*prev*0.04;
      var newsInfluence=0;
      // Apply current news direction with some probability
      if(currentNews&&Math.random()<0.6){newsInfluence=currentNews.dir*prev*0.01*(0.5+Math.random());}
      return Math.max(prev*0.5,Math.min(prev*2,prev+revert+noise+trend*prev+momentum*prev+newsInfluence));
    }

    var currentNews=null;
    function showNews(){
      var n=newsPool[Math.floor(Math.random()*newsPool.length)];
      // 20% chance news is misleading
      if(Math.random()<0.2){n={text:n.text+' ※未確認情報',dir:-n.dir,icon:'❓',cls:'news-neutral'};}
      currentNews=n;
      document.getElementById('news-icon').textContent=n.icon;
      var ntEl=document.getElementById('news-text');
      ntEl.textContent=n.text;ntEl.className=n.cls;
    }

    function initChart(){
      rates=[100];currentRate=100;trend=0;momentum=0;
      for(var i=1;i<10;i++){currentRate=generateRate(currentRate);rates.push(parseFloat(currentRate.toFixed(2)));}
      currentRate=rates[rates.length-1];
      var ctx=document.getElementById('fx-chart').getContext('2d');
      if(chart)chart.destroy();
      chart=new Chart(ctx,{
        type:'line',
        data:{labels:rates.map(function(){return''}),datasets:[{data:rates,borderColor:'#C9A84C',borderWidth:2,pointRadius:0,pointHoverRadius:0,fill:{target:'origin',above:'rgba(201,168,76,0.08)'},tension:0.4}]},
        options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:true,grid:{color:'#111'},ticks:{color:'#444',font:{size:9}}}}}
      });
    }

    function updateSparkline(){
      var c=document.getElementById('sparkline');
      var ctx=c.getContext('2d');
      c.width=c.offsetWidth*2;c.height=60;
      ctx.clearRect(0,0,c.width,c.height);
      if(assetHistory.length<2)return;
      var min=Math.min.apply(null,assetHistory),max=Math.max.apply(null,assetHistory);
      var range=max-min||1;
      ctx.beginPath();ctx.strokeStyle='#C9A84C';ctx.lineWidth=1.5;
      for(var i=0;i<assetHistory.length;i++){
        var x=i/(assetHistory.length-1)*c.width;
        var y=c.height-(assetHistory[i]-min)/range*c.height*0.8-c.height*0.1;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
    }

    function updateUI(){
      var color=asset>=10000?'#C9A84C':asset>5000?'#FF9800':'#FF5252';
      document.getElementById('asset-val').style.color=color;
      document.getElementById('asset-val').textContent=fmtYen(asset);
      document.getElementById('asset-big').style.color=color;
      document.getElementById('asset-big').textContent=fmtYen(asset);
      document.getElementById('turn-header').textContent='ターン '+(turn+1)+'/'+maxTurns;
      document.getElementById('progress-fill').style.width=(turn/maxTurns*100)+'%';
      document.getElementById('rate-val').textContent=currentRate.toFixed(2);
    }

    function setLev(l){leverage=l;document.querySelectorAll('.lev-btn').forEach(function(b){b.classList.toggle('active',b.textContent==='×'+l)})}

    function floatPnl(amount){
      var el=document.createElement('div');el.className='float-num';
      el.style.left='50%';el.style.top='40%';el.style.transform='translateX(-50%)';
      el.style.color=amount>=0?'#00E676':'#FF5252';
      el.textContent=(amount>=0?'+':'')+fmtYen(Math.abs(amount));
      document.getElementById('trade-panel').appendChild(el);
      setTimeout(function(){if(el.parentNode)el.remove()},1000);
    }

    // Audio
    var audioCtx=null;
    function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
    function playTone(f,d,t,v){try{var c=initAudio(),o=c.createOscillator(),g=c.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.15,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}}
    function sndProfit(){playTone(660,0.1,'sine');setTimeout(function(){playTone(880,0.12,'sine')},80)}
    function sndLoss(){playTone(330,0.2,'square',0.12)}
    function sndTrade(){playTone(500,0.04,'sine',0.1)}
    function sndBigWin(){playTone(523,0.08,'sine');setTimeout(function(){playTone(659,0.08,'sine')},80);setTimeout(function(){playTone(784,0.08,'sine')},160);setTimeout(function(){playTone(1047,0.15,'sine')},240)}
    function sndBigLoss(){playTone(200,0.15,'sawtooth',0.15);setTimeout(function(){playTone(150,0.25,'sawtooth',0.12)},150)}
    function vibrate(ms){try{navigator.vibrate(ms)}catch(e){}}

    function trade(action){
      if(trading||turn>=maxTurns)return;
      trading=true;sndTrade();
      var oldRate=currentRate;
      currentRate=parseFloat(generateRate(currentRate).toFixed(2));
      rates.push(currentRate);
      chart.data.labels.push('');chart.data.datasets[0].data.push(currentRate);
      if(rates.length>20){rates.shift();chart.data.labels.shift();chart.data.datasets[0].data.shift();}
      chart.update();

      var change=(currentRate-oldRate)/oldRate;
      var pnl=0;
      if(action==='buy')pnl=asset*change*leverage;
      else if(action==='sell')pnl=asset*(-change)*leverage;
      asset=Math.max(0,asset+pnl);
      tradeResults.push(pnl);
      if(pnl>0){wins++;if(pnl>bestTrade)bestTrade=pnl;}
      if(pnl<0){losses++;if(pnl<worstTrade)worstTrade=pnl;}
      assetHistory.push(asset);
      updateSparkline();

      var rEl=document.getElementById('trade-result');
      var rcEl=document.getElementById('rate-change');
      rcEl.textContent=(change>=0?'+':'')+(change*100).toFixed(2)+'%';
      rcEl.style.color=change>=0?'#00E676':'#FF5252';

      if(pnl>0){rEl.innerHTML='<span class="green">+'+fmtYen(pnl)+'</span>';sndProfit();vibrate(30);if(pnl/asset>0.15)sndBigWin();floatPnl(pnl);}
      else if(pnl<0){rEl.innerHTML='<span class="red">'+fmtYen(pnl)+'</span>';sndLoss();vibrate([30,20,50]);if(Math.abs(pnl)/asset>0.15)sndBigLoss();floatPnl(pnl);}
      else{rEl.innerHTML='<span style="color:#888">様子見</span>';floatPnl(0);}

      turn++;updateUI();showNews();
      if(asset<=0){asset=0;setTimeout(gameOver,400);}
      else if(turn>=maxTurns){setTimeout(gameOver,400);}
      setTimeout(function(){trading=false},250);
    }

    function gameStart(){
      asset=10000;turn=0;leverage=1;trading=false;trend=0;momentum=0;
      assetHistory=[10000];tradeResults=[];bestTrade=-Infinity;worstTrade=Infinity;wins=0;losses=0;
      setLev(1);
      document.getElementById('trade-result').textContent='';
      document.getElementById('rate-change').textContent='';
      initChart();updateUI();showNews();updateSparkline();
      showScreen('play');
      if(typeof gtag==='function')gtag('event','game_start',{game_name:GAME_NAME});
    }

    function gameOver(){
      var fa=Math.floor(asset);var pnl=fa-10000;
      var hs=parseInt(localStorage.getItem('veliq_fx_hs')||'0');
      if(fa>hs){localStorage.setItem('veliq_fx_hs',fa.toString());hs=fa;}

      var rank,rankStyle;
      if(fa>=100000000){rank='億り人';rankStyle='background:#C9A84C;color:#000';}
      else if(fa>=1000000){rank='ミリオネア';rankStyle='background:#2a5a2a;color:#00E676';}
      else if(fa>=100000){rank='トレーダー';rankStyle='background:#1a3a5a;color:#88ccff';}
      else if(fa>=10000){rank='初心者';rankStyle='background:#222;color:#888';}
      else if(fa>0){rank='破産寸前';rankStyle='background:#3a1a1a;color:#FF5252';}
      else{rank='ゼロカット';rankStyle='background:#ff0000;color:#fff';}

      var rb=document.getElementById('result-rank-badge');rb.textContent=rank;rb.style.cssText=rankStyle;
      var ra=document.getElementById('result-asset');ra.textContent=fmtYen(fa);ra.className=fa>=10000?'gold':'red';
      var rp=document.getElementById('result-pnl');
      rp.innerHTML=pnl>=0?'<span class="green">損益: +'+fmtYen(pnl)+'</span>':'<span class="red">損益: '+fmtYen(pnl)+'</span>';
      var totalTrades=wins+losses;
      document.getElementById('s-winrate').textContent=totalTrades>0?Math.round(wins/totalTrades*100)+'%':'-%';
      document.getElementById('s-best').textContent=bestTrade>-Infinity?'+'+fmtYen(bestTrade):'-';
      document.getElementById('s-worst').textContent=worstTrade<Infinity?fmtYen(worstTrade):'-';
      document.getElementById('hs-display').textContent='ハイスコア: '+fmtYen(hs);

      if(typeof gtag==='function')gtag('event',fa<=0?'game_over':'game_clear',{game_name:GAME_NAME,score:fa});
      showScreen('result');showAd('ad-result');showInterstitial();
    }

    function buildShareData(){var fa=Math.floor(asset);var rank=fa>=100000000?'億り人':fa>=1000000?'ミリオネア':fa>=100000?'トレーダー':'初心者';return{asset:fa.toLocaleString(),rank:rank}}

    // Init highscore display
    (function(){var hs=localStorage.getItem('veliq_fx_hs');if(hs)document.getElementById('hs-start').textContent='ハイスコア: '+fmtYen(parseInt(hs))})();

    // Common
    function showAd(id){var c=document.getElementById(id);if(!c)return;c.innerHTML='<ins class="adsbygoogle" style="display:block" data-ad-client="'+AD_CLIENT+'" data-ad-slot="XXXXXXXXXX" data-ad-format="auto" data-full-width-responsive="true"></ins>';try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch(e){}}
    function showInterstitial(){playCount++;if(playCount%5!==0)return;var o=document.createElement('div');o.id='veliq-interstitial';o.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:10000;display:flex;align-items:center;justify-content:center';o.innerHTML='<div style="background:#111;border:1px solid #C9A84C;border-radius:12px;padding:24px;max-width:340px;width:90%;text-align:center"><p style="color:#C9A84C;margin-bottom:16px">広告</p><button onclick="document.getElementById(\'veliq-interstitial\').remove()" style="padding:10px 32px;background:#C9A84C;color:#000;border:none;border-radius:6px;font-size:16px;cursor:pointer;font-family:Noto Sans JP,sans-serif">閉じる</button></div>';document.body.appendChild(o)}
    function getShareText(d){var t=SHARE_TEXT;for(var k in d)t=t.replace(new RegExp('\\{'+k+'\\}','g'),d[k]);return t}
    function shareX(){if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'twitter'});window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(getShareText(buildShareData()))+'&url='+encodeURIComponent(location.href),'_blank','width=550,height=420')}
    function shareLINE(){if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'line'});window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(location.href)+'&text='+encodeURIComponent(getShareText(buildShareData())),'_blank')}
    function copyLink(){if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'copy'});if(navigator.clipboard){navigator.clipboard.writeText(location.href).then(function(){alert('URLをコピーしました！')})}else{var t=document.createElement('textarea');t.value=location.href;t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);alert('URLをコピーしました！')}}
    if('serviceWorker' in navigator){navigator.serviceWorker.register('../../sw.js').catch(function(){})}
  </script>
</body>
</html>
