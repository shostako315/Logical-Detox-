    "@context": "https://schema.org",

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;font-family:'Noto Sans JP',sans-serif;background:#000;color:#fff;overflow-x:hidden;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    #app{width:100%;min-height:100%;max-width:480px;margin:0 auto;position:relative;display:flex;flex-direction:column}
    #header{padding:12px 16px;text-align:center;border-bottom:1px solid #222;position:sticky;top:0;background:#000;z-index:5}
    #game-title{font-size:18px;font-weight:900;color:#C9A84C}
    #score-display{font-size:13px;color:#aaa;margin-top:4px}
    #game-area{flex:1;position:relative;overflow-y:auto}
    .screen{position:absolute;top:0;left:0;width:100%;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;transition:opacity 0.3s;z-index:10}
    .screen.hidden{opacity:0;pointer-events:none;z-index:0}
    .screen h2{font-size:24px;font-weight:900;color:#C9A84C;margin-bottom:16px}
    .screen p{color:#ccc;margin-bottom:12px;line-height:1.6}
    .btn{display:inline-block;padding:14px 40px;background:#C9A84C;color:#000;font-size:18px;font-weight:700;border:none;border-radius:8px;cursor:pointer;margin:8px;font-family:'Noto Sans JP',sans-serif;transition:transform 0.1s}
    .btn:active{transform:scale(0.95)}
    .share-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
    .share-btn{padding:10px 16px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans JP',sans-serif}
    .share-x{background:#000;color:#fff;border:1px solid #555}
    .share-line{background:#06C755;color:#fff}
    .share-copy{background:#333;color:#fff}
    .ad-container{width:100%;min-height:50px;margin:12px 0;text-align:center}
    .gold{color:#C9A84C}.big{font-size:36px;font-weight:900}.red{color:#ff4444}.green{color:#44ff44}

    /* FX styles */
    #trade-panel{width:100%;padding:16px}
    #chart-container{width:100%;height:200px;background:#0a0a0a;border-radius:8px;margin-bottom:16px;position:relative}
    #chart-container canvas{width:100%!important;height:100%!important}
    #asset-display{font-size:28px;font-weight:900;margin:8px 0}
    #turn-display{font-size:14px;color:#aaa;margin-bottom:12px}
    #rate-display{font-size:16px;color:#ccc;margin-bottom:16px}
    .lev-bar{display:flex;gap:6px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
    .lev-btn{padding:8px 14px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid #333;background:#111;color:#aaa;font-family:'Noto Sans JP',sans-serif;transition:border-color 0.2s}
    .lev-btn.active{border-color:#C9A84C;color:#C9A84C}
    .action-bar{display:flex;gap:8px;justify-content:center}
    .action-btn{flex:1;padding:14px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans JP',sans-serif}
    .buy-btn{background:#1a472a;color:#44ff44}
    .sell-btn{background:#472a1a;color:#ff4444}
    .hold-btn{background:#222;color:#aaa}
    .action-btn:active{transform:scale(0.96)}
    #trade-result{font-size:16px;font-weight:700;margin-top:12px;min-height:24px}
    #highscore-display{color:#aaa;font-size:14px;margin-top:8px}
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="game-title">💹 FXトレードゲーム</div>
      <div id="score-display">資産: ¥10,000 | ターン: 1/30</div>
    </div>

    <div id="game-area">
      <!-- Start Screen -->
      <div id="screen-start" class="screen">
        <h2>💹 1万円を1億円にしろ！</h2>
        <p>ランダムな為替チャートで売買判断！<br>レバレッジを選んで30ターン勝負！</p>
        <p style="font-size:13px;color:#666">※ 仮想通貨ペア VLQ/JPY</p>
        <button class="btn" onclick="gameStart()">トレード開始</button>
        <div id="highscore-display"></div>
      </div>

      <!-- Play Screen -->
      <div id="screen-play" class="screen hidden">
        <div id="trade-panel">
          <div id="chart-container"><canvas id="fx-chart"></canvas></div>
          <div id="rate-display"></div>
          <div id="asset-display" class="gold">¥10,000</div>
          <div id="turn-display">ターン 1 / 30</div>
          <div id="trade-result"></div>

          <div class="lev-bar">
            <button class="lev-btn active" onclick="setLev(1)">×1</button>
            <button class="lev-btn" onclick="setLev(5)">×5</button>
            <button class="lev-btn" onclick="setLev(10)">×10</button>
            <button class="lev-btn" onclick="setLev(25)">×25</button>
          </div>

          <div class="action-bar">
            <button class="action-btn buy-btn" onclick="trade('buy')">買い</button>
            <button class="action-btn hold-btn" onclick="trade('hold')">様子見</button>
            <button class="action-btn sell-btn" onclick="trade('sell')">売り</button>
          </div>
        </div>
      </div>

      <!-- Result Screen -->
      <div id="screen-gameover" class="screen hidden">
        <h2>トレード結果</h2>
        <p id="result-message"></p>
        <p>最終資産</p>
        <p id="gameover-score" class="big"></p>
        <p id="result-pnl"></p>
        <div class="ad-container" id="ad-gameover"></div>
        <div class="share-bar">
          <button class="share-btn share-x" onclick="shareX()">Xでシェア</button>
          <button class="share-btn share-line" onclick="shareLINE()">LINEでシェア</button>
          <button class="share-btn share-copy" onclick="copyLink()">URLコピー</button>
        </div>
        <button class="btn" style="margin-top:16px" onclick="gameStart()">もう一回</button>
      </div>
    </div>
  </div>

  <script>
    var GAME_NAME = 'fx-trade';
    var SHARE_TEXT = 'FXゲームで{asset}円達成！ #VeliqGames';
    var AD_CLIENT = 'ca-pub-XXXXXXXXXXXXXXXX';
    var playCount = 0;

    var asset = 10000;
    var turn = 0;
    var maxTurns = 30;
    var leverage = 1;
    var rates = [];
    var chart = null;
    var currentRate = 100;
    var trading = false;

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function(s){s.classList.add('hidden')});
      document.getElementById('screen-'+id).classList.remove('hidden');
    }

    function formatYen(n) {
      if (n < 0) n = 0;
      return '¥' + Math.floor(n).toLocaleString();
    }

    function generateRate(prev) {
      // Random walk with slight mean reversion and momentum
      var volatility = 0.02 + Math.random() * 0.03;
      var drift = (100 - prev) * 0.005; // mean reversion
      var shock = (Math.random() - 0.5) * 2 * volatility * prev;
      var trend = (Math.random() > 0.5 ? 1 : -1) * prev * 0.005;
      return Math.max(prev * 0.7, Math.min(prev * 1.5, prev + drift + shock + trend));
    }

    function initChart() {
      // Generate initial price history
      rates = [100];
      currentRate = 100;
      for (var i = 1; i < 10; i++) {
        currentRate = generateRate(currentRate);
        rates.push(parseFloat(currentRate.toFixed(2)));
      }
      currentRate = rates[rates.length - 1];

      var ctx = document.getElementById('fx-chart').getContext('2d');
      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: rates.map(function(_, i) { return ''; }),
          datasets: [{
            data: rates,
            borderColor: '#C9A84C',
            borderWidth: 2,
            pointRadius: 0,
            fill: {
              target: 'origin',
              above: 'rgba(201,168,76,0.1)'
            },
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 300 },
          plugins: { legend: { display: false } },
          scales: {
            x: { display: false },
            y: {
              display: true,
              grid: { color: '#1a1a1a' },
              ticks: { color: '#555', font: { size: 10 } }
            }
          }
        }
      });
    }

    // === SOUND EFFECTS ===
    var audioCtx=null;
    function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
    function playSound(freq,dur,type){try{initAudio();var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type||'sine';o.frequency.value=freq;g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}}
    function playProfit(){playSound(660,0.1,'sine');setTimeout(function(){playSound(880,0.15,'sine')},80)}
    function playLoss(){playSound(330,0.2,'square')}
    function playTrade(){playSound(440,0.05,'sine')}
    function vibrate(ms){if(navigator.vibrate)navigator.vibrate(ms)}

    function updateUI() {
      var color = asset >= 10000 ? '#C9A84C' : '#ff4444';
      document.getElementById('asset-display').style.color = color;
      document.getElementById('asset-display').textContent = formatYen(asset);
      document.getElementById('turn-display').textContent = 'ターン ' + (turn + 1) + ' / ' + maxTurns;
      document.getElementById('rate-display').textContent = 'VLQ/JPY: ' + currentRate.toFixed(2);
      document.getElementById('score-display').textContent = '資産: ' + formatYen(asset) + ' | ターン: ' + (turn + 1) + '/' + maxTurns;
    }

    function setLev(l) {
      leverage = l;
      document.querySelectorAll('.lev-btn').forEach(function(b) {
        b.classList.toggle('active', b.textContent === '×' + l);
      });
    }

    function trade(action) {
      if (trading || turn >= maxTurns) return;
      trading = true;

      var oldRate = currentRate;
      currentRate = generateRate(currentRate);
      currentRate = parseFloat(currentRate.toFixed(2));
      rates.push(currentRate);
      chart.data.labels.push('');
      chart.data.datasets[0].data.push(currentRate);

      // Keep chart window to last 20 points
      if (rates.length > 20) {
        rates.shift();
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
      }
      chart.update();

      var change = (currentRate - oldRate) / oldRate;
      var pnl = 0;
      var resultEl = document.getElementById('trade-result');

      if (action === 'buy') {
        pnl = asset * change * leverage;
      } else if (action === 'sell') {
        pnl = asset * (-change) * leverage;
      }
      // hold = no pnl

      asset = Math.max(0, asset + pnl);

      if (pnl > 0) {
        resultEl.innerHTML = '<span class="green">+' + formatYen(pnl) + ' (' + (change > 0 ? '+' : '') + (change * 100).toFixed(2) + '%)</span>';
        playProfit(); vibrate(50);
      } else if (pnl < 0) {
        resultEl.innerHTML = '<span class="red">' + formatYen(pnl).replace('¥', '-¥') + ' (' + (change * 100).toFixed(2) + '%)</span>';
        playLoss(); vibrate(100);
      } else {
        resultEl.innerHTML = '<span style="color:#aaa">様子見… (変動: ' + (change > 0 ? '+' : '') + (change * 100).toFixed(2) + '%)</span>';
        playTrade();
      }

      turn++;
      updateUI();

      if (asset <= 0) {
        asset = 0;
        setTimeout(gameOver, 500);
      } else if (turn >= maxTurns) {
        setTimeout(gameOver, 500);
      }

      setTimeout(function() { trading = false; }, 300);
    }

    function gameStart() {
      asset = 10000; turn = 0; leverage = 1; trading = false;
      setLev(1);
      document.getElementById('trade-result').textContent = '';
      initChart();
      updateUI();
      showScreen('play');
      if(typeof gtag==='function') gtag('event','game_start',{game_name:GAME_NAME});
    }

    function gameOver() {
      var finalAsset = Math.floor(asset);
      var pnl = finalAsset - 10000;
      var pnlPct = ((finalAsset / 10000 - 1) * 100).toFixed(1);

      // Save highscore
      var hs = parseInt(localStorage.getItem('veliq_fx_highscore') || '0');
      if (finalAsset > hs) {
        localStorage.setItem('veliq_fx_highscore', finalAsset.toString());
        hs = finalAsset;
      }

      var scoreEl = document.getElementById('gameover-score');
      scoreEl.textContent = formatYen(finalAsset);
      scoreEl.className = 'big ' + (finalAsset >= 10000 ? 'gold' : 'red');

      var pnlEl = document.getElementById('result-pnl');
      if (pnl >= 0) {
        pnlEl.innerHTML = '<span class="green">損益: +' + formatYen(pnl) + ' (+' + pnlPct + '%)</span>';
      } else {
        pnlEl.innerHTML = '<span class="red">損益: -' + formatYen(Math.abs(pnl)) + ' (' + pnlPct + '%)</span>';
      }

      var msgs;
      if (finalAsset >= 100000000) msgs = '億り人達成！天才トレーダー！';
      else if (finalAsset >= 1000000) msgs = 'ミリオネア！素晴らしい！';
      else if (finalAsset >= 100000) msgs = 'なかなかのトレーダー！';
      else if (finalAsset >= 10000) msgs = 'まずまずの結果！';
      else if (finalAsset > 0) msgs = '溶けた…レバレッジは怖い…';
      else msgs = 'ゼロカット！全財産消失！';

      document.getElementById('result-message').textContent = msgs;
      document.getElementById('highscore-display').textContent = 'ハイスコア: ' + formatYen(hs);

      var evtName = finalAsset <= 0 ? 'game_over' : 'game_clear';
      if(typeof gtag==='function') gtag('event',evtName,{game_name:GAME_NAME,score:finalAsset});

      showScreen('gameover');
      showAd('ad-gameover');
      showInterstitial();
    }

    function buildShareData() { return { asset: Math.floor(asset).toLocaleString() }; }

    // Show highscore on start
    (function() {
      var hs = localStorage.getItem('veliq_fx_highscore');
      if (hs) document.getElementById('highscore-display').textContent = 'ハイスコア: ' + formatYen(parseInt(hs));
    })();

    // === COMMON FUNCTIONS ===
    function showAd(containerId){var c=document.getElementById(containerId);if(!c)return;c.innerHTML='<ins class="adsbygoogle" style="display:block" data-ad-client="'+AD_CLIENT+'" data-ad-slot="XXXXXXXXXX" data-ad-format="auto" data-full-width-responsive="true"></ins>';try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch(e){}}
    function showInterstitial(){playCount++;if(playCount%5!==0)return;var o=document.createElement('div');o.id='veliq-interstitial';o.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:10000;display:flex;align-items:center;justify-content:center;';o.innerHTML='<div style="background:#111;border:1px solid #C9A84C;border-radius:12px;padding:24px;max-width:340px;width:90%;text-align:center;"><p style="color:#C9A84C;margin-bottom:16px;">広告</p><ins class="adsbygoogle" style="display:block" data-ad-client="'+AD_CLIENT+'" data-ad-slot="XXXXXXXXXX" data-ad-format="auto"></ins><button onclick="document.getElementById(\'veliq-interstitial\').remove()" style="margin-top:16px;padding:10px 32px;background:#C9A84C;color:#000;border:none;border-radius:6px;font-size:16px;cursor:pointer;">閉じる</button></div>';document.body.appendChild(o);try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch(e){}}
    function getShareText(data){var t=SHARE_TEXT;for(var k in data){t=t.replace(new RegExp('\\{'+k+'\\}','g'),data[k])}return t}
    function shareX(){if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'twitter'});window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(getShareText(buildShareData()))+'&url='+encodeURIComponent(location.href),'_blank','width=550,height=420')}
    function shareLINE(){if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'line'});window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(location.href)+'&text='+encodeURIComponent(getShareText(buildShareData())),'_blank')}
    function copyLink(){if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'copy'});if(navigator.clipboard){navigator.clipboard.writeText(location.href).then(function(){alert('URLをコピーしました！')})}else{var t=document.createElement('textarea');t.value=location.href;t.style.cssText='position:fixed;opacity:0;';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);alert('URLをコピーしました！')}}
    if('serviceWorker' in navigator){navigator.serviceWorker.register('../../sw.js').catch(function(){})}
  </script>
</body>
</html>
