  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;font-family:'Noto Sans JP',sans-serif;background:#000;color:#fff;overflow:hidden;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}

    /* === HEADER === */

    /* Lane background lines */
    .lane-bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
    .lane-line{position:absolute;top:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,rgba(201,168,76,0.06) 30%,rgba(201,168,76,0.1) 80%,rgba(201,168,76,0.3))}

    /* Beat pulse background */
    .beat-pulse{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 85%,rgba(201,168,76,0.08),transparent 60%);opacity:0;transition:opacity 0.05s;pointer-events:none;z-index:1}
    .beat-pulse.on{opacity:1}

    /* === HIT ZONE === */
    #hit-zone{position:absolute;bottom:15%;left:0;width:100%;height:4px;z-index:10;pointer-events:none}
    #hit-zone-line{position:absolute;left:5%;width:90%;height:100%;background:linear-gradient(90deg,transparent,#C9A84C,transparent);box-shadow:0 0 20px rgba(201,168,76,0.6),0 0 40px rgba(201,168,76,0.3);border-radius:2px}
    #hit-zone-glow{position:absolute;left:5%;width:90%;height:40px;top:-18px;background:linear-gradient(to bottom,transparent,rgba(201,168,76,0.05));pointer-events:none}

    /* Hit zone pulse ring */
    .hit-ring{position:absolute;bottom:calc(15% - 30px);left:50%;width:60px;height:60px;margin-left:-30px;border:2px solid rgba(201,168,76,0.3);border-radius:50%;z-index:9;pointer-events:none;animation:hitRingPulse 0.5s ease-in-out infinite}
    @keyframes hitRingPulse{0%{transform:scale(0.8);opacity:0.6}50%{transform:scale(1.2);opacity:0.2}100%{transform:scale(0.8);opacity:0.6}}

    /* === NOTES === */
    .note{position:absolute;left:50%;z-index:5;pointer-events:none;transform:translateX(-50%)}
    .note-circle{width:50px;height:50px;border-radius:50%;border:3px solid #C9A84C;background:radial-gradient(circle at 35% 35%,rgba(201,168,76,0.3),rgba(201,168,76,0.05));display:flex;align-items:center;justify-content:center;box-shadow:0 0 15px rgba(201,168,76,0.3),inset 0 0 10px rgba(201,168,76,0.1)}
    .note-circle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:rgba(201,168,76,0.5)}

    @keyframes screenShake{0%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}}

    .ad-container{width:100%;min-height:50px;margin:12px 0}

    /* === COUNTDOWN === */
    #countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;background:rgba(0,0,0,0.85);pointer-events:none}
    #countdown.hidden{display:none}
    #countdown-num{font-size:120px;font-weight:900;color:#C9A84C;text-shadow:0 0 60px rgba(201,168,76,0.5);animation:countPop 0.5s ease}
    @keyframes countPop{0%{transform:scale(2);opacity:0}50%{transform:scale(0.9)}100%{transform:scale(1);opacity:1}}

    /* === RESULT DETAILS === */
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:280px;margin:12px auto}
    .result-item{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:12px;text-align:center}
    .result-label{font-size:11px;color:#666;margin-bottom:4px}

    .rank-a{color:#8BC9A8}
    .rank-b{color:#88aacc}
    .rank-c{color:#cc8888}
    .rank-d{color:#ff4444}

    /* === START SCREEN EXTRAS === */
    .start-baton{font-size:60px;margin-bottom:20px;animation:batonSwing 1.5s ease-in-out infinite}
    @keyframes batonSwing{0%{transform:rotate(-20deg)}50%{transform:rotate(20deg)}100%{transform:rotate(-20deg)}}
    .how-to{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:12px;padding:16px;margin:16px 0;text-align:left;width:100%;max-width:300px}
    .how-to-title{font-size:12px;color:#C9A84C;font-weight:700;margin-bottom:8px}
    .how-to p{font-size:12px;color:#777;margin-bottom:4px}

    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}

<body>
  <div id="app">
    <div id="header">

    <div id="game-area">
      <div class="lane-bg">
        <div class="lane-line" style="left:20%"></div>

        <div class="lane-line" style="left:60%"></div>

      </div>

      <div id="hit-zone"><div id="hit-zone-line"></div><div id="hit-zone-glow"></div></div>

      <!-- Start -->
      <div id="screen-start" class="screen">

          <p>⚪ GOOD … ±100ms</p>
          <p>🔴 MISS … それ以外</p>
        </div>

      </div>

      <!-- Result -->
      <div id="screen-result" class="screen hidden">
        <h2>RESULT</h2>

        <div id="result-rank"></div>
        <div class="result-grid">
          <div class="result-item"><div class="result-label">PERFECT</div><div class="result-value r-perfect" id="r-perfect">0</div></div>
          <div class="result-item"><div class="result-label">GREAT</div><div class="result-value r-great" id="r-great">0</div></div>
          <div class="result-item"><div class="result-label">GOOD</div><div class="result-value r-good" id="r-good">0</div></div>
          <div class="result-item"><div class="result-label">MISS</div><div class="result-value r-miss" id="r-miss">0</div></div>
        </div>
        <p style="margin-top:8px">SCORE</p>
        <p class="gold" style="font-size:36px;font-weight:900" id="r-score">0</p>
        <div class="ad-container" id="ad-result"></div>
        <div class="share-bar">
          <button class="share-btn share-x" onclick="shareX()">Xでシェア</button>
          <button class="share-btn share-line" onclick="shareLINE()">LINEでシェア</button>
          <button class="share-btn share-copy" onclick="copyLink()">URLコピー</button>
        </div>
        <button class="btn" style="margin-top:12px" onclick="startCountdown()">もう一回</button>
      </div>
    </div>

    <div id="countdown" class="hidden"><div id="countdown-num"></div></div>
  </div>

  <script>
    // === CONFIG ===
    var GAME_NAME='conductor';
    var SHARE_TEXT='指揮者ゲームで{score}点（{perfect}回PERFECT）！ #VeliqGames';
    var AD_CLIENT='ca-pub-XXXXXXXXXXXXXXXX';
    var playCount=0;
    var TOTAL_NOTES=30;
    var BPM=120;
    var BEAT_MS=60000/BPM; // 500ms
    var NOTE_FALL_TIME=1800; // ms for note to fall from top to hit zone
    var HIT_ZONE_RATIO=0.85; // hit zone at 85% from top

    // Judgment windows (in ms) - PERFECT is brutally tight
    var WIN_PERFECT=30;
    var WIN_GREAT=60;
    var WIN_GOOD=100;

    // State
    var score=0,combo=0,maxCombo=0,notesHit={perfect:0,great:0,good:0,miss:0};
    var notesSent=0,notesResolved=0;
    var gameRunning=false;
    var activeNotes=[];
    var gameAreaEl,noteTimer,gameLoopId;

    // === AUDIO ENGINE (Web Audio API) ===
    var audioCtx=null;
    function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

    function playTone(freq,dur,type,vol){
      try{
        var ctx=initAudio();
        var osc=ctx.createOscillator();
        var gain=ctx.createGain();
        osc.type=type||'sine';
        osc.frequency.setValueAtTime(freq,ctx.currentTime);
        gain.gain.setValueAtTime(vol||0.2,ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
        osc.connect(gain);gain.connect(ctx.destination);
        osc.start();osc.stop(ctx.currentTime+dur);
      }catch(e){}
    }

    function sndPerfect(){playTone(880,0.12,'sine',0.25);setTimeout(function(){playTone(1320,0.1,'sine',0.2)},60);}
    function sndGreat(){playTone(660,0.12,'sine',0.2);}
    function sndGood(){playTone(440,0.08,'sine',0.15);}
    function sndMiss(){playTone(150,0.25,'sawtooth',0.2);}
    function sndTick(){playTone(1000,0.02,'square',0.08);}
    function sndComboMilestone(){playTone(1200,0.08,'sine',0.2);setTimeout(function(){playTone(1600,0.1,'sine',0.15)},80);}
    function sndCountdown(){playTone(600,0.15,'sine',0.2);}
    function sndGo(){playTone(900,0.1,'sine',0.25);setTimeout(function(){playTone(1200,0.15,'sine',0.2)},100);}
    function sndGameOver(){playTone(400,0.15,'square',0.2);setTimeout(function(){playTone(300,0.15,'square',0.18)},150);setTimeout(function(){playTone(200,0.3,'square',0.15)},300);}
    function sndRankGood(){playTone(523,0.1,'sine',0.2);setTimeout(function(){playTone(659,0.1,'sine',0.18)},100);setTimeout(function(){playTone(784,0.15,'sine',0.2)},200);setTimeout(function(){playTone(1047,0.2,'sine',0.15)},300);}
    function vibrate(pattern){try{navigator.vibrate(pattern)}catch(e){}}

    // === SCREEN MANAGEMENT ===
    function showScreen(id){
      document.querySelectorAll('.screen').forEach(function(s){s.classList.add('hidden')});
      var el=document.getElementById('screen-'+id);
      if(el)el.classList.remove('hidden');
    }

    // === COUNTDOWN ===
    function startCountdown(){
      showScreen('none');
      var cdEl=document.getElementById('countdown');
      var numEl=document.getElementById('countdown-num');
      cdEl.classList.remove('hidden');
      var count=3;
      numEl.textContent=count;
      sndCountdown();
      var iv=setInterval(function(){
        count--;
        if(count>0){numEl.textContent=count;sndCountdown();}
        else if(count===0){numEl.textContent='GO!';sndGo();}
        else{clearInterval(iv);cdEl.classList.add('hidden');gameStart();}
      },700);
    }

    // === GAME START ===
    function gameStart(){
      score=0;combo=0;maxCombo=0;notesSent=0;notesResolved=0;
      notesHit={perfect:0,great:0,good:0,miss:0};
      activeNotes=[];
      gameRunning=true;
      updateScoreDisplay();
      updateComboDisplay();
      document.getElementById('progress-bar').style.width='0%';

      // Clear old notes
      gameAreaEl=document.getElementById('game-area');
      gameAreaEl.querySelectorAll('.note,.judgment,.particle').forEach(function(n){n.remove()});

      if(typeof gtag==='function')gtag('event','game_start',{game_name:GAME_NAME});

      // Start sending notes
      sendNextNote();
    }

    function sendNextNote(){
      if(!gameRunning||notesSent>=TOTAL_NOTES)return;
      spawnNote();
      notesSent++;
      document.getElementById('progress-bar').style.width=(notesSent/TOTAL_NOTES*100)+'%';

      if(notesSent<TOTAL_NOTES){
        // Vary timing slightly for musical feel
        var nextDelay=BEAT_MS+(Math.random()-0.5)*80;
        noteTimer=setTimeout(sendNextNote,nextDelay);
      }
    }

    // === NOTE SPAWNING ===
    function spawnNote(){
      var note=document.createElement('div');
      note.className='note';
      var laneOffsets=[-60,-30,0,30,60];
      var offsetX=laneOffsets[Math.floor(Math.random()*laneOffsets.length)];
      note.style.left='calc(50% + '+offsetX+'px)';
      note.innerHTML='<div class="note-trail"></div><div class="note-circle"></div>';

      var areaH=gameAreaEl.offsetHeight;
      var startY=-60;
      var endY=areaH*HIT_ZONE_RATIO-25;
      note.style.top=startY+'px';

      gameAreaEl.appendChild(note);

      // Beat pulse
      var bp=document.getElementById('beat-pulse');
      bp.classList.add('on');
      setTimeout(function(){bp.classList.remove('on')},80);
      sndTick();

      var noteObj={
        el:note,
        spawnTime:performance.now(),
        targetTime:performance.now()+NOTE_FALL_TIME,
        startY:startY,
        endY:endY,
        totalDist:endY-startY,
        resolved:false,
        offsetX:offsetX
      };
      activeNotes.push(noteObj);

      // Start animation loop if not running
      if(!gameLoopId)gameLoopId=requestAnimationFrame(gameLoop);
    }

    // === GAME LOOP (60fps) ===
    function gameLoop(now){
      if(!gameRunning){gameLoopId=null;return;}

      for(var i=activeNotes.length-1;i>=0;i--){
        var n=activeNotes[i];
        if(n.resolved)continue;

        var elapsed=now-n.spawnTime;
        var progress=elapsed/NOTE_FALL_TIME;
        var currentY=n.startY+n.totalDist*progress;
        n.el.style.top=currentY+'px';

        // Note passed the hit zone - auto miss
        if(elapsed>NOTE_FALL_TIME+WIN_GOOD+50){
          resolveNote(i,'miss',now);
        }
      }

      // Clean up resolved notes
      for(var j=activeNotes.length-1;j>=0;j--){
        if(activeNotes[j].resolved&&performance.now()-activeNotes[j].resolveTime>600){
          if(activeNotes[j].el.parentNode)activeNotes[j].el.remove();
          activeNotes.splice(j,1);
        }
      }

      gameLoopId=requestAnimationFrame(gameLoop);
    }

    // === TAP HANDLER ===
    function handleTap(){
      if(!gameRunning)return;
      var now=performance.now();

      // Find closest unresolved note to hit zone
      var bestIdx=-1,bestDist=Infinity;
      for(var i=0;i<activeNotes.length;i++){
        if(activeNotes[i].resolved)continue;
        var dist=Math.abs(now-activeNotes[i].targetTime);
        if(dist<bestDist){bestDist=dist;bestIdx=i;}
      }

      if(bestIdx<0)return;

      if(bestDist<=WIN_PERFECT){resolveNote(bestIdx,'perfect',now);}
      else if(bestDist<=WIN_GREAT){resolveNote(bestIdx,'great',now);}
      else if(bestDist<=WIN_GOOD){resolveNote(bestIdx,'good',now);}
      else if(bestDist<=200){resolveNote(bestIdx,'miss',now);} // Tapped but too far off
    }

    // === RESOLVE NOTE ===
    function resolveNote(idx,judgment,now){
      var n=activeNotes[idx];
      if(n.resolved)return;
      n.resolved=true;
      n.resolveTime=performance.now();
      notesResolved++;
      notesHit[judgment]++;

      var pts=0,mult=getMultiplier();
      var flash=document.getElementById('screen-flash');

      switch(judgment){
        case'perfect':
          pts=300*mult;combo++;sndPerfect();vibrate(30);
          showJudgment('PERFECT!','j-perfect');
          spawnParticles(n.el,16,'#C9A84C');
          flash.className='gold';setTimeout(function(){flash.className=''},100);
          // Animate note out
          n.el.style.transition='transform 0.2s,opacity 0.2s';
          n.el.style.transform='translateX(-50%) scale(1.5)';n.el.style.opacity='0';
          break;
        case'great':
          pts=100*mult;combo++;sndGreat();vibrate(20);
          showJudgment('GREAT!','j-great');
          spawnParticles(n.el,8,'#8BC9A8');
          n.el.style.transition='transform 0.15s,opacity 0.15s';
          n.el.style.transform='translateX(-50%) scale(1.3)';n.el.style.opacity='0';
          break;
        case'good':
          pts=50;combo++;sndGood();
          showJudgment('GOOD','j-good');
          n.el.style.transition='opacity 0.15s';n.el.style.opacity='0';
          break;
        case'miss':
          pts=0;combo=0;sndMiss();vibrate([50,30,80]);
          showJudgment('MISS','j-miss');
          flash.className='red';setTimeout(function(){flash.className=''},150);
          document.getElementById('app').classList.add('shake');
          setTimeout(function(){document.getElementById('app').classList.remove('shake')},300);
          n.el.style.transition='opacity 0.3s';n.el.style.opacity='0.2';
          break;
      }

      if(combo>maxCombo)maxCombo=combo;
      score+=pts;
      updateScoreDisplay();
      updateComboDisplay();

      // Combo milestones
      if(combo>0&&combo%5===0)sndComboMilestone();

      // Check if game is over
      if(notesResolved>=TOTAL_NOTES){
        setTimeout(gameOver,500);
      }
    }

    // === DISPLAY UPDATES ===
    function getMultiplier(){
      if(combo>=15)return 4;
      if(combo>=10)return 3;
      if(combo>=5)return 2;
      return 1;
    }

    function updateScoreDisplay(){
      var el=document.getElementById('score-val');
      el.textContent=score;
      el.classList.add('bump');
      setTimeout(function(){el.classList.remove('bump')},100);
    }

    function updateComboDisplay(){
      var el=document.getElementById('combo-count');
      el.textContent=combo;
      document.getElementById('multiplier').textContent='×'+getMultiplier();
      if(combo>=5){el.classList.add('big');setTimeout(function(){el.classList.remove('big')},150);}
    }

    // === VISUAL EFFECTS ===
    function showJudgment(text,cls){
      var j=document.createElement('div');
      j.className='judgment '+cls;
      j.textContent=text;
      gameAreaEl.appendChild(j);
      setTimeout(function(){if(j.parentNode)j.remove()},600);
    }

    function spawnParticles(noteEl,count,color){
      var rect=noteEl.getBoundingClientRect();
      var areaRect=gameAreaEl.getBoundingClientRect();
      var cx=rect.left+rect.width/2-areaRect.left;
      var cy=rect.top+rect.height/2-areaRect.top;
      for(var i=0;i<count;i++){
        var p=document.createElement('div');
        p.className='particle';
        var angle=Math.random()*Math.PI*2;
        var dist=40+Math.random()*60;
        p.style.cssText='left:'+cx+'px;top:'+cy+'px;background:'+color+';--px:'+(Math.cos(angle)*dist)+'px;--py:'+(Math.sin(angle)*dist)+'px;width:'+(3+Math.random()*4)+'px;height:'+(3+Math.random()*4)+'px;';
        gameAreaEl.appendChild(p);
        setTimeout(function(el){return function(){if(el.parentNode)el.remove()}}(p),500);
      }
    }

    // === GAME OVER ===
    var taunts=['お前には無理だ','指揮者の才能ゼロ','もう一回？（笑）','リズム感壊滅的だな','音楽の神に見放されてる','メトロノームでも買えば？','才能のかけらもない','え、本気で押したの？','練習しても無駄だよ','指揮棒折っていいよ'];

    function gameOver(){
      gameRunning=false;
      clearTimeout(noteTimer);
      if(gameLoopId){cancelAnimationFrame(gameLoopId);gameLoopId=null;}

      // Determine rank
      var pct=notesHit.perfect/TOTAL_NOTES;
      var rank,rankCls;
      if(pct>=0.8){rank='S';rankCls='rank-s';sndRankGood();}
      else if(pct>=0.5){rank='A';rankCls='rank-a';sndRankGood();}
      else if(pct>=0.3){rank='B';rankCls='rank-b';sndGameOver();}
      else if(pct>=0.1){rank='C';rankCls='rank-c';sndGameOver();}
      else{rank='D';rankCls='rank-d';sndGameOver();}

      document.getElementById('r-perfect').textContent=notesHit.perfect;
      document.getElementById('r-great').textContent=notesHit.great;
      document.getElementById('r-good').textContent=notesHit.good;
      document.getElementById('r-miss').textContent=notesHit.miss;
      document.getElementById('r-score').textContent=score;
      var rankEl=document.getElementById('result-rank');
      rankEl.textContent=rank;rankEl.className=rankCls;
      document.getElementById('taunt').textContent=rank==='D'||rank==='C'?taunts[Math.floor(Math.random()*taunts.length)]:(rank==='S'?'天才指揮者！':'なかなかやるな…');

      if(typeof gtag==='function')gtag('event','game_over',{game_name:GAME_NAME,score:score});
      showScreen('result');
      showAd('ad-result');
      showInterstitial();
    }

    // === INPUT ===
    document.addEventListener('touchstart',function(e){
      if(!gameRunning)return;
      e.preventDefault();handleTap();
    },{passive:false});
    document.addEventListener('mousedown',function(){if(gameRunning)handleTap()});
    document.addEventListener('keydown',function(e){if(gameRunning&&(e.code==='Space'||e.code==='KeyZ'))handleTap()});

    // === AD/SHARE/ANALYTICS ===
    function showAd(id){var c=document.getElementById(id);if(!c)return;c.innerHTML='<ins class="adsbygoogle" style="display:block" data-ad-client="'+AD_CLIENT+'" data-ad-slot="XXXXXXXXXX" data-ad-format="auto" data-full-width-responsive="true"></ins>';try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch(e){}}
    function showInterstitial(){playCount++;if(playCount%5!==0)return;var o=document.createElement('div');o.id='veliq-interstitial';o.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:10000;display:flex;align-items:center;justify-content:center;';o.innerHTML='<div style="background:#111;border:1px solid #C9A84C;border-radius:12px;padding:24px;max-width:340px;width:90%;text-align:center;"><p style="color:#C9A84C;margin-bottom:16px;">広告</p><button onclick="document.getElementById(\'veliq-interstitial\').remove()" style="margin-top:16px;padding:10px 32px;background:#C9A84C;color:#000;border:none;border-radius:6px;font-size:16px;cursor:pointer;font-family:Noto Sans JP,sans-serif">閉じる</button></div>';document.body.appendChild(o)}
    function buildShareData(){return{score:score,perfect:notesHit.perfect}}
    function getShareText(data){var t=SHARE_TEXT;for(var k in data){t=t.replace(new RegExp('\\{'+k+'\\}','g'),data[k])}return t}
    function shareX(){if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'twitter'});window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(getShareText(buildShareData()))+'&url='+encodeURIComponent(location.href),'_blank','width=550,height=420')}
    function shareLINE(){if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'line'});window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(location.href)+'&text='+encodeURIComponent(getShareText(buildShareData())),'_blank')}
    function copyLink(){if(typeof gtag==='function')gtag('event','share_click',{game_name:GAME_NAME,platform:'copy'});if(navigator.clipboard){navigator.clipboard.writeText(location.href).then(function(){alert('URLをコピーしました！')})}else{var t=document.createElement('textarea');t.value=location.href;t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);alert('URLをコピーしました！')}}
    if('serviceWorker' in navigator){navigator.serviceWorker.register('../../sw.js').catch(function(){})}
  </script>
</body>
</html>
